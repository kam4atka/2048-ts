extends:
  - 'htmlacademy/vanilla'
  - 'plugin:@typescript-eslint/recommended'
  - 'plugin:@typescript-eslint/recommended-type-checked'

env:
  es2022: true
  browser: true

overrides:
  - files:
      - "*.ts"
      - "*.tsx"
    parserOptions:
      project:
        - ./tsconfig.json

rules:
  'no-shadow': 'off'
  '@typescript-eslint/no-shadow': 'error'
  '@typescript-eslint/no-unsafe-enum-comparison': 'off'
